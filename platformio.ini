[platformio]
default_envs = m5stickc-plus

[env]
# Versions pinned to what was tested at fork time. Bumping should be a
# conscious choice — silent transitive updates have broken M5 builds before.
platform = espressif32 @ 7.0.1
framework = arduino
monitor_speed = 115200
board_build.filesystem = littlefs
build_flags =
    -DCORE_DEBUG_LEVEL=0
build_src_filter = +<*> +<buddies/>
lib_deps =
    bitbank2/AnimatedGIF @ 2.2.2
    bblanchon/ArduinoJson @ 7.4.3

[env:m5stickc-plus]
board = m5stick-c
board_build.partitions = no_ota.csv
board_build.f_cpu = 160000000L
build_flags =
    ${env.build_flags}
    -DBUDDY_M5STICKC_PLUS
lib_deps =
    ${env.lib_deps}
    m5stack/M5StickCPlus @ 0.1.1

# M5StickS3 = ESP32-S3-PICO + 135x240 ST7789. There's no dedicated PIO board
# profile, so we use the generic esp32-s3-devkitc-1 and let M5Unified handle
# the hardware-specific configuration at runtime via autodetect.
[env:m5stick-s3]
board = esp32-s3-devkitc-1
upload_speed = 921600
board_build.partitions = default_8MB.csv
board_upload.flash_size = 8MB
build_flags =
    ${env.build_flags}
    -DBUDDY_M5STICKS3
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
lib_deps =
    ${env.lib_deps}
    m5stack/M5Unified @ 0.2.15

# Diagnostic build: replaces normal setup/loop with the rotation overlay.
# Use to physically check how LCD rotations 0..3 map to corners + which IMU
# axis is gravity. NOT for normal use — there's no BLE, no pet, no clock.
[env:m5stick-s3-diag]
extends = env:m5stick-s3
build_flags =
    ${env:m5stick-s3.build_flags}
    -DBUDDY_DIAG_ROTATION
